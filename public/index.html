<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FamilyConnect">
<meta name="theme-color" content="#1a1a2e">
<title>FamilyConnect</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1a2e;--card:#16213e;--primary:#e94560;--secondary:#0f3460;--text:#fff;--text2:#888;--text3:#666;--border:#16213e;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100%;overflow:hidden;position:fixed;width:100%;overscroll-behavior-y:none}
#app{height:100%;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.screen{flex:1;display:none;flex-direction:column;overflow:hidden}.screen.active{display:flex}
.header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:10}
.header h1{font-size:20px;font-weight:700;color:var(--primary)}.header p{font-size:12px;color:var(--text2);margin-top:2px}
.home-grid{flex:1;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow-y:auto}
.home-card{background:var(--card);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(233,69,96,0.2);transition:transform 0.2s}.home-card:active{transform:scale(0.95);border-color:var(--primary)}.home-card .icon{font-size:32px}.home-card .title{font-size:15px;font-weight:600}.home-card .subtitle{font-size:11px;color:var(--text2);text-align:center}
.users-bar{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}.users-bar::-webkit-scrollbar{display:none}
.user-pill{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.message{max-width:80%;padding:10px 14px;border-radius:18px;word-wrap:break-word;animation:msgIn 0.2s ease}@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.mine{align-self:flex-end;background:var(--primary);border-bottom-right-radius:4px}.message.theirs{align-self:flex-start;background:var(--card);border-bottom-left-radius:4px}
.message .sender{font-size:11px;font-weight:600;margin-bottom:3px;opacity:0.8}.message .time{font-size:10px;opacity:0.6;margin-top:4px;text-align:right}
.input-area{padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg)}
.input-area input{flex:1;background:var(--card);border:none;border-radius:20px;padding:10px 16px;color:var(--text);font-size:16px;outline:none}.input-area button{background:var(--primary);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;flex-shrink:0}.input-area button.camera{background:var(--secondary);font-size:16px}
.join-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:16px}
.join-screen .logo{width:80px;height:80px;background:var(--primary);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:8px}
.join-screen h1{font-size:24px;font-weight:700;color:var(--primary)}.join-screen p{color:var(--text2);font-size:14px;margin-bottom:16px}
.join-screen input{width:100%;max-width:300px;background:var(--card);border:1px solid transparent;border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;outline:none}.join-screen input:focus{border-color:var(--primary)}
.join-screen button{width:100%;max-width:300px;background:var(--primary);border:none;border-radius:12px;padding:14px;color:white;font-size:16px;font-weight:600}
.bottom-nav{display:flex;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);background:var(--bg)}
.bottom-nav button{flex:1;background:none;border:none;color:var(--text2);padding:8px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px}.bottom-nav button.active{color:var(--primary)}.bottom-nav button .icon{font-size:22px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px}.empty .icon{font-size:48px;opacity:0.5}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,0,0,0.8);color:white;padding:10px 20px;border-radius:20px;font-size:14px;z-index:3000;opacity:0;transition:all 0.3s;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.install-banner{position:fixed;top:0;left:0;right:0;background:var(--primary);padding:12px 16px;padding-top:calc(12px + var(--safe-top));z-index:1000;display:none;align-items:center;justify-content:space-between}.install-banner.show{display:flex}.install-banner span{font-weight:600;font-size:14px}.install-banner button{background:white;color:var(--primary);border:none;padding:6px 16px;border-radius:16px;font-weight:600;font-size:13px}
.camera-preview{position:fixed;top:0;left:0;right:0;bottom:0;background:black;z-index:2000;display:none;flex-direction:column}.camera-preview.active{display:flex}.camera-preview video{flex:1;object-fit:cover}.camera-preview .camera-controls{padding:16px;display:flex;justify-content:center;gap:20px}.camera-preview button{width:60px;height:60px;border-radius:50%;border:3px solid white;background:none;color:white;font-size:20px}.camera-preview button.capture{background:white;color:black}
.image-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;display:none;align-items:center;justify-content:center}.image-viewer.active{display:flex}.image-viewer img{max-width:90%;max-height:80%;border-radius:8px}.image-viewer .close-btn{position:absolute;top:20px;right:20px;background:none;border:none;color:white;font-size:28px}
</style>
</head>
<body>
<div class="install-banner" id="installBanner"><span>📲 Install FamilyConnect</span><button onclick="installApp()">Install</button></div>
<div class="toast" id="toast"></div>
<div class="camera-preview" id="cameraPreview"><video id="cameraVideo" autoplay playsinline></video><div class="camera-controls"><button onclick="closeCamera()">✕</button><button class="capture" onclick="capturePhoto()">📷</button><button onclick="switchCamera()">🔄</button></div></div>
<div class="image-viewer" id="imageViewer" onclick="closeImageViewer()"><button class="close-btn">✕</button><img id="viewerImg" src="" alt="Photo"></div>
<div id="app"></div>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
const SERVER=window.location.origin;let socket=null,userId=localStorage.getItem('fc_user')||'',currentRoom='',currentScreen='join',stream=null,currentCamera='user',deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').classList.add('show')});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{document.getElementById('installBanner').classList.remove('show')})}else{showToast('Tap Share → Add to Home Screen')}}
if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream&&!window.navigator.standalone){setTimeout(()=>showToast('Tap Share ➜ Add to Home Screen'),2000)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
const app=document.getElementById('app');
function render(){if(currentScreen==='join')showJoin();else if(currentScreen==='home')showHome();else if(currentScreen==='messages')showMessages();else if(currentScreen==='calls')showCalls()}
function showJoin(){app.innerHTML='<div class="join-screen"><div class="logo">👨‍👩‍👧</div><h1>FamilyConnect</h1><p>Your private family space</p><input id="nameInput" placeholder="Your name" value="'+userId+'" maxlength="20"><input id="roomInput" placeholder="Room" value="family" maxlength="20"><button onclick="joinRoom()">Join Room</button></div>';document.getElementById('nameInput').focus();document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter')joinRoom()})}
function joinRoom(){const name=document.getElementById('nameInput').value.trim(),room=document.getElementById('roomInput').value.trim()||'family';if(!name){document.getElementById('nameInput').style.borderColor='var(--primary)';return}userId=name;currentRoom=room;localStorage.setItem('fc_user',userId);socket=io(SERVER,{transports:['websocket','polling'],timeout:20000});socket.on('connect',()=>{socket.emit('join',{userId,room});currentScreen='home';render()});socket.on('message-history',msgs=>{if(currentScreen==='messages')showMessages(msgs)});socket.on('new-message',msg=>{if(currentScreen==='messages'){addMessage(msg);scrollToBottom()}else showToast('💬 '+msg.userId+': '+msg.text.substring(0,30)+'...')});socket.on('room-users',list=>updateUsersBar(list));socket.on('incoming-call',data=>{if(confirm('📞 '+data.from+' is calling! Answer?')){currentScreen='calls';render()}})}
function showHome(){app.innerHTML='<div class="screen active" style="flex:1"><div class="header"><h1>FamilyConnect</h1><p>Room: '+currentRoom+'</p></div><div class="home-grid"><div class="home-card" onclick="goToMessages()"><span class="icon">💬</span><span class="title">Messages</span><span class="subtitle">Chat with family</span></div><div class="home-card" onclick="goToCalls()"><span class="icon">📞</span><span class="title">Calls</span><span class="subtitle">Audio calls</span></div><div class="home-card" onclick="showToast(\'Coming soon\')"><span class="icon">👥</span><span class="title">Family</span><span class="subtitle">Contacts</span></div><div class="home-card" onclick="showToast(\'Coming soon\')"><span class="icon">📁</span><span class="title">Files</span><span class="subtitle">Photos & videos</span></div></div></div>'+bottomNav('home')}
function goToMessages(){currentScreen='messages';render();socket.emit('join',{userId,room:currentRoom})}
function goToCalls(){currentScreen='calls';render()}
function showMessages(history=[]){app.innerHTML='<div class="screen active"><div class="header"><h1>Messages</h1><p>Room: '+currentRoom+'</p></div><div class="users-bar" id="usersBar"></div><div class="messages" id="msgs"></div><div class="input-area"><button class="camera" onclick="openCamera()">📷</button><input id="txt" placeholder="Type a message..." onkeypress="if(event.key===\'Enter\')sendMessage()"><button onclick="sendMessage()">➤</button></div></div>';const msgs=document.getElementById('msgs');if(history.length===0)msgs.innerHTML='<div class="empty"><div class="icon">💬</div><div>No messages yet</div></div>';else{history.forEach(addMessage);scrollToBottom()}let startY=0;msgs.addEventListener('touchstart',e=>{startY=e.touches[0].clientY});msgs.addEventListener('touchend',e=>{if(msgs.scrollTop===0&&e.changedTouches[0].clientY-startY>60)showToast('Refreshed')});document.getElementById('txt').focus()}
function addMessage(msg){const div=document.getElementById('msgs');if(!div)return;const empty=div.querySelector('.empty');if(empty)empty.remove();const isMine=msg.userId===userId,el=document.createElement('div');el.className='message '+(isMine?'mine':'theirs');const time=new Date(msg.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(!isMine)el.innerHTML='<div class="sender" style="color:'+(msg.theme||'#888')+'">'+msg.userId+'</div>'+msg.text+'<<div class="time">'+time+'</div>';else el.innerHTML=msg.text+'<<div class="time">'+time+'</div>';div.appendChild(el)}
function scrollToBottom(){const div=document.getElementById('msgs');if(div)div.scrollTop=div.scrollHeight}
function updateUsersBar(list){const bar=document.getElementById('usersBar');if(!bar)return;bar.innerHTML=list.map(u=>'<<span class="user-pill" style="background:'+(u.theme||'#333')+'33;color:'+(u.theme||'#888')+';border:1px solid '+(u.theme||'#333')+'55;">'+u.userId+'</span>').join('')}
function sendMessage(){const txt=document.getElementById('txt'),text=txt.value.trim();if(!text||!socket)return;socket.emit('send-message',{text});txt.value='';txt.focus()}
function showCalls(){app.innerHTML='<div class="screen active"><div class="header"><h1>Calls</h1><p>Audio calls with family</p></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;"><div style="font-size:64px;">📞</div><button onclick="startCall()" style="background:var(--primary);border:none;border-radius:50%;width:80px;height:80px;font-size:32px;">📞</button><p style="color:var(--text2);">Tap to start audio call</p></div></div>'+bottomNav('calls')}
function startCall(){if(!socket)return;socket.emit('call-user',{callType:'audio'});showToast('Calling...')}
function bottomNav(active){return'<div class="bottom-nav"><button class="'+(active==='home'?'active':'')+'" onclick="currentScreen=\'home\';render();"><span class="icon">🏠</span><span>Home</span></button><button class="'+(active==='messages'?'active':'')+'" onclick="goToMessages()"><span class="icon">💬</span><span>Chat</span></button><button class="'+(active==='calls'?'active':'')+'" onclick="goToCalls()"><span class="icon">📞</span><span>Calls</span></button><button onclick="showToast(\'Profile soon\')"><span class="icon">👤</span><span>Me</span></button></div>'}
async function openCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:currentCamera},audio:false});document.getElementById('cameraVideo').srcObject=stream;document.getElementById('cameraPreview').classList.add('active')}catch(e){showToast('Camera access denied')}}
function closeCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}document.getElementById('cameraPreview').classList.remove('active')}
function switchCamera(){currentCamera=currentCamera==='user'?'environment':'user';closeCamera();openCamera()}
function capturePhoto(){const video=document.getElementById('cameraVideo'),canvas=document.createElement('canvas');canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext('2d').drawImage(video,0,0);const dataUrl=canvas.toDataURL('image/jpeg',0.7);if(socket)socket.emit('send-message',{text:'📷 Photo',image:dataUrl});closeCamera();showToast('Photo sent')}
function viewImage(src){document.getElementById('viewerImg').src=src;document.getElementById('imageViewer').classList.add('active')}
function closeImageViewer(){document.getElementById('imageViewer').classList.remove('active')}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{})
render();
</script>
</body>
</html>
