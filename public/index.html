<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FamilyConnect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: -apple-system, sans-serif; }
    #app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; text-align: center; border-bottom: 1px solid #16213e; }
    .header h1 { color: #e94560; font-size: 24px; }
    .header p { color: #888; font-size: 14px; margin-top: 4px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 16px; margin-bottom: 8px; word-wrap: break-word; }
    .mine { align-self: flex-end; background: #e94560; margin-left: auto; border-bottom-right-radius: 4px; }
    .theirs { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
    .their-user { color: #888; font-size: 11px; margin-bottom: 2px; }
    .input-bar { display: flex; padding: 12px; border-top: 1px solid #16213e; gap: 8px; }
    input { flex: 1; background: #16213e; border: none; border-radius: 20px; padding: 10px 16px; color: #fff; font-size: 16px; outline: none; }
    button { background: #e94560; border: none; border-radius: 20px; padding: 10px 20px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
    .join { padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .join h1 { color: #e94560; margin-bottom: 8px; font-size: 28px; }
    .join p { color: #888; margin-bottom: 32px; font-size: 14px; }
    .join input { margin-bottom: 12px; width: 100%; padding: 14px 16px; }
    .join button { width: 100%; padding: 14px; border-radius: 12px; }
    .empty { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const SERVER = window.location.origin;
    let socket = null;
    let userId = localStorage.getItem('fc_user') || 'user-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('fc_user', userId);
    
    const app = document.getElementById('app');
    
    function showJoin() {
      app.innerHTML = `
        <div class="join">
          <h1>FamilyConnect</h1>
          <p>Your private family space</p>
          <input id="room" placeholder="Room name (e.g. family)" value="family">
          <button onclick="join()">Join Room</button>
        </div>
      `;
    }
    
    function join() {
      const room = document.getElementById('room').value.trim();
      if (!room) return;
      
      socket = io(SERVER, { transports: ['websocket', 'polling'] });
      
      socket.on('connect', () => {
        socket.emit('join', { userId, room });
      });
      
      socket.on('message-history', (msgs) => {
        showChat(room, msgs);
      });
      
      socket.on('new-message', (msg) => {
        addMessage(msg);
      });
    }
    
    function showChat(room, history) {
      app.innerHTML = `
        <div class="header">
          <h1>Messages</h1>
          <p>Room: ${room}</p>
        </div>
        <div class="messages" id="msgs"></div>
        <div class="input-bar">
          <input id="txt" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
          <button onclick="send()">Send</button>
        </div>
      `;
      if (history.length === 0) {
        document.getElementById('msgs').innerHTML = '<div class="empty">No messages yet</div>';
      } else {
        history.forEach(addMessage);
      }
      document.getElementById('txt').focus();
    }
    
    function addMessage(msg) {
      const div = document.getElementById('msgs');
      if (!div) return;
      const empty = div.querySelector('.empty');
      if (empty) empty.remove();
      const el = document.createElement('div');
      el.className = 'message ' + (msg.userId === userId ? 'mine' : 'theirs');
      el.innerHTML = (msg.userId !== userId ? `<div class="their-user">${msg.userId}</div>` : '') + msg.text;
      div.appendChild(el);
      div.scrollTop = div.scrollHeight;
    }
    
    function send() {
      const txt = document.getElementById('txt');
      const text = txt.value.trim();
      if (!text || !socket) return;
      socket.emit('send-message', { text });
      txt.value = '';
      txt.focus();
    }
    
    showJoin();
  </script>
</body>
</html>
