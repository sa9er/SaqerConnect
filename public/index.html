<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FamilyConnect Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: -apple-system, sans-serif; }
    #app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; text-align: center; border-bottom: 1px solid #16213e; }
    .header h1 { color: #e94560; font-size: 24px; }
    .call-status { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    .avatar { width: 80px; height: 80px; border-radius: 40px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 20px; }
    .timer { font-size: 32px; margin: 20px 0; font-variant-numeric: tabular-nums; }
    .call-controls { display: flex; gap: 20px; margin-top: 30px; }
    .ctrl-btn { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .end-btn { background: #e94560; width: 80px; height: 80px; border-radius: 40px; }
    .mute-btn { background: #333; }
    .join { padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .join h1 { color: #e94560; margin-bottom: 8px; font-size: 28px; }
    .join p { color: #888; margin-bottom: 32px; }
    .join input { margin-bottom: 12px; width: 100%; padding: 14px 16px; background: #16213e; border: none; border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; }
    .join button { width: 100%; padding: 14px; border-radius: 12px; background: #e94560; border: none; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }
    .users { padding: 8px 16px; border-bottom: 1px solid #16213e; display: flex; gap: 6px; overflow-x: auto; }
    .pill { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const SERVER = window.location.origin;
    let socket = null;
    let userId = localStorage.getItem('fc_user') || '';
    let userTheme = localStorage.getItem('fc_theme') || '';
    let pc = null;
    let localStream = null;
    let isMuted = false;
    let callTimer = null;
    let seconds = 0;

    const themes = ['#e94560', '#4ecca3', '#f0a500', '#4a69bd', '#6c5ce7', '#00b894'];

    const app = document.getElementById('app');

    function showJoin() {
      app.innerHTML = `
        <div class="join">
          <h1>FamilyConnect</h1>
          <p>Join the call</p>
          <input id="name" placeholder="Your name" value="${userId}">
          <button onclick="join()">Join Call</button>
        </div>
      `;
      document.getElementById('name').focus();
    }

    function join() {
      const name = document.getElementById('name').value.trim();
      if (!name) return;

      userId = name;
      localStorage.setItem('fc_user', userId);

      if (!userTheme) {
        userTheme = themes[Math.floor(Math.random() * themes.length)];
        localStorage.setItem('fc_theme', userTheme);
      }

      socket = io(SERVER, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        socket.emit('join', { userId, room: 'family', theme: userTheme });
      });

      socket.on('room-users', (list) => {
        showCallScreen(list);
      });

      socket.on('incoming-call', async (data) => {
        document.getElementById('callState').textContent = '📞 ' + data.from + ' is calling';
      });

      socket.on('signal', async (data) => {
        if (!pc) return;
        try {
          if (data.signal.sdp?.type === 'offer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { to: data.from, signal: { sdp: pc.localDescription } });
          } else if (data.signal.sdp?.type === 'answer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
          } else if (data.signal.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
          }
        } catch(e) { console.error(e); }
      });
    }

    async function showCallScreen(users) {
      app.innerHTML = `
        <div class="header"><h1>FamilyConnect</h1></div>
        <div class="users" id="usersBar"></div>
        <div class="call-status">
          <div class="avatar">👤</div>
          <div id="callState" style="color:#4ecca3">Connected</div>
          <div class="timer" id="timer">00:00</div>
          <div class="call-controls">
            <button class="ctrl-btn mute-btn" onclick="toggleMute()">🎤</button>
            <button class="ctrl-btn end-btn" onclick="endCall()">🔴</button>
          </div>
        </div>
      `;

      updateUsers(users);
      startLocalAudio();
    }

    function updateUsers(list) {
      const bar = document.getElementById('usersBar');
      if (!bar) return;
      bar.innerHTML = list.map(u =>
        `<span class="pill" style="background:${u.theme || '#e94560'}22; color:${u.theme || '#e94560'}; border:1px solid ${u.theme || '#e94560'}44">${u.userId}</span>`
      ).join('');
    }

    async function startLocalAudio() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        console.log('Microphone ready');
      } catch(err) {
        console.error('Mic error:', err);
        document.getElementById('callState').textContent = '⚠️ Mic access denied';
      }
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      document.querySelector('.mute-btn').style.background = isMuted ? '#e94560' : '#333';
    }

    function endCall() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (pc) pc.close();
      if (callTimer) clearInterval(callTimer);
      if (socket) socket.disconnect();
      showJoin();
    }

    showJoin();
  </script>
</body>
</html>
