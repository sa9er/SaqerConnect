<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FamilyConnect Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: -apple-system, sans-serif; }
    .container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; text-align: center; border-bottom: 1px solid #16213e; }
    .header h1 { color: #e94560; font-size: 24px; }
    .status { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .text { font-size: 16px; margin: 8px 0; }
    .timer { font-size: 28px; margin: 12px 0; }
    .controls { display: flex; gap: 16px; margin-top: 24px; }
    .btn { border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .call-btn { background: #4ecca3; color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 18px; font-weight: bold; }
    .end { background: #e94560; width: 70px; height: 70px; border-radius: 35px; font-size: 20px; }
    .mute { background: #333; width: 60px; height: 60px; border-radius: 30px; font-size: 20px; }
    .join { padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .join h1 { color: #e94560; margin-bottom: 8px; font-size: 28px; }
    .join input { width: 100%; padding: 14px; background: #16213e; border: none; border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 12px; }
    .join button { width: 100%; padding: 14px; border-radius: 12px; background: #e94560; border: none; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }
    .users { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="join">
      <h1>FamilyConnect</h1>
      <p>Private Call</p>
      <input id="name" placeholder="Your name">
      <button onclick="join()">Join Call</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const SERVER = window.location.origin;
    let socket, pc, localStream, isMuted = false, seconds = 0, timer = null, myId;

    function join() {
      myId = document.getElementById('name').value.trim();
      if (!myId) return;

      socket = io(SERVER, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => socket.emit('join', { userId: myId, room: 'family' }));
      socket.on('room-users', updateUsers);
      socket.on('signal', handleSignal);
      socket.on('incoming-call', handleIncomingCall);
      showRoom();
    }

    function showRoom() {
      document.getElementById('app').innerHTML = `
        <div class="header"><h1>FamilyConnect</h1></div>
        <div class="status">
          <div class="text" id="status">You: ${myId}</div>
          <div class="users" id="users">Waiting for others...</div>
          <button class="btn call-btn" id="callBtn" onclick="startCall()">📞 Call</button>
          <button class="btn end" onclick="hangup()" style="margin-top:20px">🔴</button>
        </div>`;
    }

    function updateUsers(list) {
      const others = list.filter(u => u.userId !== myId);
      const el = document.getElementById('users');
      if (el) el.textContent = others.length > 0 ? '👤 ' + others.map(u => u.userId).join(', ') : 'No one else';
    }

    async function startCall() {
      document.getElementById('status').textContent = 'Calling...';
      document.getElementById('callBtn').style.display = 'none';
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch(e) {
        document.getElementById('status').textContent = '⚠️ Mic denied';
        return;
      }
      
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      
      pc.onicecandidate = e => {
        if (e.candidate) socket.emit('signal', { to: socket.id, signal: { candidate: e.candidate } });
      };
      
      pc.ontrack = e => onRemoteTrack(e);
      
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('call-user', { callType: 'audio' });
      socket.emit('signal', { to: socket.id, signal: { sdp: pc.localDescription } });
    }

    async function handleIncomingCall(data) {
      document.getElementById('status').textContent = '📞 ' + data.from;
      document.getElementById('callBtn').style.display = 'none';
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch(e) {
        document.getElementById('status').textContent = '⚠️ Mic denied';
        return;
      }
      
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      
      pc.onicecandidate = e => {
        if (e.candidate) socket.emit('signal', { to: data.from, signal: { candidate: e.candidate } });
      };
      
      pc.ontrack = e => onRemoteTrack(e);
    }

    function onRemoteTrack(e) {
      document.getElementById('status').textContent = '✅ Connected';
      const audio = new Audio();
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      audio.playsInline = true;
      
      // Force play on mobile
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // If autoplay blocked, show a button
          const btn = document.createElement('button');
          btn.textContent = '🔊 Tap to hear';
          btn.style.cssText = 'background:#4ecca3;color:#fff;border:none;padding:10px 20px;border-radius:8px;margin-top:10px;';
          btn.onclick = () => audio.play();
          document.getElementById('status').after(btn);
        });
      }
      
      startTimer();
      showControls();
    }

    async function handleSignal(data) {
      if (!pc) return;
      try {
        if (data.signal.sdp?.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('signal', { to: data.from, signal: { sdp: pc.localDescription } });
        } else if (data.signal.sdp?.type === 'answer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
        } else if (data.signal.candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
        }
      } catch(e) { console.error(e); }
    }

    function startTimer() {
      timer = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60).toString().padStart(2,'0');
        const s = (seconds%60).toString().padStart(2,'0');
        const el = document.getElementById('timer');
        if (el) el.textContent = m + ':' + s;
      }, 1000);
    }

    function showControls() {
      const statusEl = document.getElementById('status');
      if (statusEl) statusEl.insertAdjacentHTML('afterend', `
        <div class="timer" id="timer">00:00</div>
        <div class="controls">
          <button class="btn mute" onclick="toggleMute()">🎤</button>
          <button class="btn end" onclick="hangup()">🔴</button>
        </div>`);
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      document.querySelector('.mute').style.background = isMuted ? '#e94560' : '#333';
    }

    function hangup() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (pc) pc.close();
      if (timer) clearInterval(timer);
      if (socket) socket.disconnect();
      location.reload();
    }
  </script>
</body>
</html>
