<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FamilyConnect Call</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a2e; color:#fff; font-family:-apple-system, sans-serif; }
        #app { max-width:500px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
        .join { padding:40px 20px; text-align:center; flex:1; display:flex; flex-direction:column; justify-content:center; }
        .join h1 { color:#e94560; font-size:28px; margin-bottom:8px; }
        .join p { color:#888; margin-bottom:32px; }
        .join input { width:100%; padding:14px; background:#16213e; border:none; border-radius:12px; color:#fff; font-size:16px; margin-bottom:12px; }
        .join button { width:100%; padding:14px; border-radius:12px; background:#e94560; border:none; color:#fff; font-weight:bold; font-size:18px; cursor:pointer; }
        .call { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .avatar { width:80px; height:80px; border-radius:40px; background:#333; display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:20px; }
        .status { color:#4ecca3; margin-bottom:8px; font-size:18px; }
        .timer { font-size:28px; margin:12px 0; }
        .controls { display:flex; gap:20px; margin-top:30px; }
        .btn { width:60px; height:60px; border-radius:30px; border:none; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .end { background:#e94560; width:80px; height:80px; border-radius:40px; }
        .mute { background:#333; }
        .hidden { display:none; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const SERVER = window.location.origin;
        let socket, userId, userTheme, pc, localStream;
        let isMuted = false, callTimer, seconds = 0;
        const themes = ['#e94560','#4ecca3','#f0a500','#4a69bd','#6c5ce7','#00b894'];
        const app = document.getElementById('app');

        function showJoin() {
            userId = localStorage.getItem('fc_user') || '';
            userTheme = localStorage.getItem('fc_theme') || '';
            app.innerHTML = `
                <div class="join">
                    <h1>FamilyConnect</h1>
                    <p>Secure encrypted call</p>
                    <input id="name" placeholder="Your name" value="${userId}">
                    <button onclick="join()">Join Call</button>
                </div>`;
            document.getElementById('name').focus();
        }

        function join() {
            const name = document.getElementById('name').value.trim();
            if (!name) return;
            userId = name;
            localStorage.setItem('fc_user', userId);
            if (!userTheme) {
                userTheme = themes[Math.floor(Math.random() * themes.length)];
                localStorage.setItem('fc_theme', userTheme);
            }

            socket = io(SERVER, { transports: ['websocket','polling'] });
            socket.on('connect', () => {
                socket.emit('join', { userId, room: 'family', theme: userTheme });
            });
            socket.on('room-users', (users) => showCall(users));
            socket.on('incoming-call', (data) => {
                document.getElementById('status').textContent = `📞 ${data.from} is calling`;
            });
            socket.on('signal', handleSignal);
        }

        function showCall(users) {
            app.innerHTML = `
                <div class="call">
                    <div class="avatar">👤</div>
                    <div id="status" class="status">Connected</div>
                    <div class="timer" id="timer">00:00</div>
                    <div class="controls">
                        <button class="btn mute" onclick="toggleMute()">🎤</button>
                        <button class="btn end" onclick="hangup()">🔴</button>
                    </div>
                </div>`;
            startMic();
            startTimer();
        }

        async function startMic() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
                document.getElementById('status').textContent = '✅ Mic active';
            } catch(e) {
                document.getElementById('status').textContent = '⚠️ Mic denied';
            }
        }

        function startTimer() {
            callTimer = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = m+':'+s;
            }, 1000);
        }

        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.querySelector('.mute').style.background = isMuted ? '#e94560' : '#333';
        }

        async function createPeer(target) {
            pc = new RTCPeerConnection({ iceServers:[{ urls:'stun:stun.l.google.com:19302' }] });
            if (localStream) {
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            }
            pc.onicecandidate = e => {
                if (e.candidate) socket.emit('signal', { to:target, signal:{ candidate:e.candidate } });
            };
            pc.ontrack = e => {
                const audio = new Audio();
                audio.srcObject = e.streams[0];
                audio.autoplay = true;
                document.body.appendChild(audio);
            };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { to:target, signal:{ sdp: pc.localDescription } });
        }

        async function handleSignal(data) {
            if (!pc) {
                // answer incoming call
                await createPeer(data.from);
                document.getElementById('status').textContent = '✅ Answered';
                return;
            }
            try {
                if (data.signal.sdp) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                    if (data.signal.sdp.type === 'offer') {
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        socket.emit('signal', { to:data.from, signal:{ sdp: pc.localDescription } });
                    }
                } else if (data.signal.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
                }
            } catch(e) { console.error(e); }
        }

        function hangup() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();
            if (callTimer) clearInterval(callTimer);
            seconds = 0;
            if (socket) socket.disconnect();
            showJoin();
        }

        showJoin();
    </script>
</body>
</html>
