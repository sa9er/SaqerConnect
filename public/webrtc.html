<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FamilyConnect Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: -apple-system, sans-serif; }
    .container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; text-align: center; border-bottom: 1px solid #16213e; }
    .header h1 { color: #e94560; font-size: 24px; }
    .status { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .avatar { width: 80px; height: 80px; border-radius: 40px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 20px; }
    .text { color: #4ecca3; font-size: 16px; margin-bottom: 12px; }
    .timer { font-size: 28px; margin: 12px 0; font-variant-numeric: tabular-nums; }
    .controls { display: flex; gap: 16px; margin-top: 24px; }
    .btn { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .end { background: #e94560; width: 70px; height: 70px; border-radius: 35px; }
    .mute { background: #333; }
    .join { padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .join h1 { color: #e94560; margin-bottom: 8px; font-size: 28px; }
    .join p { color: #888; margin-bottom: 32px; }
    .join input { width: 100%; padding: 14px; background: #16213e; border: none; border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 12px; }
    .join button { width: 100%; padding: 14px; border-radius: 12px; background: #e94560; border: none; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="join">
      <h1>FamilyConnect</h1>
      <p>Private Call</p>
      <input id="name" placeholder="Your name">
      <button onclick="join()">Join Call</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const SERVER = window.location.origin;
    let socket, pc, localStream, isMuted = false, seconds = 0, timer = null;
    const iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];

    function join() {
      const name = document.getElementById('name').value.trim();
      if (!name) return;

      socket = io(SERVER, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => socket.emit('join', { userId: name, room: 'family' }));
      socket.on('signal', handleSignal);
      socket.on('incoming-call', handleIncomingCall);
      showWaiting();
    }

    function showWaiting() {
      document.getElementById('app').innerHTML = `
        <div class="header"><h1>FamilyConnect</h1></div>
        <div class="status">
          <div class="avatar">👤</div>
          <div class="text" id="status">Waiting for call...</div>
          <button class="btn end" onclick="hangup()">🔴</button>
        </div>`;
    }

    async function handleIncomingCall(data) {
      document.getElementById('status').textContent = '📞 ' + data.from + ' calling';
      
      if (confirm(data.from + ' is calling. Answer?')) {
        await startMedia();
        pc = new RTCPeerConnection({ iceServers });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.onicecandidate = e => {
          if (e.candidate) socket.emit('signal', { to: data.from, signal: { candidate: e.candidate } });
        };
        
        pc.ontrack = e => {
          const audio = new Audio();
          audio.srcObject = e.streams[0];
          audio.play();
        };
        
        document.getElementById('status').textContent = '✅ Connected';
        startTimer();
        showControls();
      }
    }

    async function startMedia() {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    }

    async function handleSignal(data) {
      if (!pc) return;
      try {
        if (data.signal.sdp?.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('signal', { to: data.from, signal: { sdp: pc.localDescription } });
        } else if (data.signal.sdp?.type === 'answer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
        } else if (data.signal.candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
        }
      } catch(e) { console.error(e); }
    }

    function startTimer() {
      timer = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60).toString().padStart(2,'0');
        const s = (seconds%60).toString().padStart(2,'0');
        const el = document.getElementById('timer');
        if (el) el.textContent = m + ':' + s;
      }, 1000);
    }

    function showControls() {
      const statusEl = document.getElementById('status');
      if (statusEl) statusEl.insertAdjacentHTML('afterend', `
        <div class="timer" id="timer">00:00</div>
        <div class="controls">
          <button class="btn mute" onclick="toggleMute()">🎤</button>
          <button class="btn end" onclick="hangup()">🔴</button>
        </div>`);
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      document.querySelector('.mute').style.background = isMuted ? '#e94560' : '#333';
    }

    function hangup() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (pc) pc.close();
      if (timer) clearInterval(timer);
      if (socket) socket.disconnect();
      location.reload();
    }
  </script>
</body>
</html>
